<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VYNRise - Beranda Utama</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.45)), url('https://githubusercontent.com');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #0b0914;
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .top-header {
            background-color: #000000;
            width: 100%;
            text-align: center;
            padding: 15px 0;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 70px; 
        }

        .menu-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            width: 90%;
            max-width: 1000px;
        }

        .card-menu {
            flex: 1;
            background-color: rgba(20, 17, 37, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.2s ease;
        }
        .card-menu:hover {
            transform: translateY(-5px);
        }
        .card-menu h2 {
            margin: 0 0 15px 0;
            font-size: 22px;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .box-orange {
            border: 3px solid #ff9800;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.2);
        }
        .box-orange h2 { color: #ff9800; }

        .box-blue {
            border: 3px solid #2196f3;
            box-shadow: 0 0 15px rgba(33, 150, 243, 0.3);
        }
        .box-blue h2 { color: #2196f3; }

        .box-green {
            border: 3px solid #4caf50;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.2);
        }
        .box-green h2 { color: #4caf50; }

        .box-inner-content {
            font-size: 13px;
            color: #e2e8f0;
            line-height: 1.6;
            text-align: left;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 8px;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .box-inner-content ul {
            margin: 0;
            padding-left: 16px;
        }
        
        #isiAturan {
            white-space: pre-wrap;
            margin: 0;
            padding: 0;
            max-height: 110px;
            overflow-y: auto;
            font-family: inherit;
        }
        
        .action-link {
            display: block;
            text-align: center;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
            padding: 12px;
            border-radius: 6px;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }
        .action-link:hover { opacity: 0.9; }
        
        .btn-orange-style { background: #ff9800; color: #000; }
        .btn-blue-goto { background: linear-gradient(135deg, #007acc, #2196f3); } 
        .btn-discord-style { background: #5865F2; margin-bottom: 6px; }
        .btn-wa-style { background: #25D366; }

        .toast {
            visibility: hidden;
            background-color: #1e1b4b;
            color: #e9d5ff;
            border: 1px solid #6b21a8;
            text-align: center;
            border-radius: 8px;
            padding: 12px 24px;
            position: fixed;
            z-index: 10;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        .toast.show { visibility: visible; }

        /* 📱 KODE BARU: PERBAIKAN KHUSUS UNTUK HP KETIKA LAYAR DI BAWAH 768px */
        @media (max-width: 768px) {
            .top-header {
                font-size: 22px; /* Mengecilkan teks judul atas */
                padding: 10px 0;
            }
            .main-content {
                padding: 15px;
                padding-bottom: 40px; /* Jarak pas saat di-scroll di HP */
                justify-content: center;
            }
            .menu-container {
                flex-direction: column; /* Mengubah jejeran dari menyamping menjadi atas-bawah */
                gap: 15px; /* Memberi jarak antar kotak agar tidak menempel */
                width: 100%;
            }
            .card-menu {
                width: 100%;
                box-sizing: border-box;
                padding: 15px 12px; /* Memperkecil padding dalam kotak agar menghemat ruang */
            }
            .card-menu h2 {
                font-size: 18px; /* Ukuran teks ATURAN, GABUNG, KOMUNITAS lebih pas */
                margin-bottom: 10px;
            }
            .box-inner-content {
                min-height: auto; /* Mengikuti tinggi konten asli agar tidak mubazir ruang */
                font-size: 12px;  /* Mengecilkan ukuran teks dalam kotak */
            }
            .action-link {
                padding: 10px; /* Ukuran tombol lebih nyaman ditekan jari */
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <div class="top-header">VYNRise</div>

    <div class="main-content">
        <div class="menu-container">
            
            <div class="card-menu box-orange">
                <h2>ATURAN</h2>
                <div class="box-inner-content">
                    <pre id="isiAturan">Memuat aturan server...</pre>
                </div>
                <a href="#" onclick="showToast('Selamat bermain, patuhi selalu aturan ya!'); return false;" class="action-link btn-orange-style" style="margin-top: 10px;">Saya Mengerti</a>
            </div>

            <div class="card-menu box-blue">
                <h2>GABUNG</h2>
                <div class="box-inner-content">
                    <a href="masuk.html" class="action-link btn-blue-goto">⚡ MENU MASUK SERVER</a>
                </div>
            </div>

            <div class="card-menu box-green">
                <h2>KOMUNITAS</h2>
                <div class="box-inner-content">
                    <a href="https://discord.gg" target="_blank" class="action-link btn-discord-style">Discord Server</a>
                    <a href="https://whatsapp.com" target="_blank" class="action-link btn-wa-style">Grup WhatsApp</a>
                </div>
            </div>

        </div>
    </div>

    <div id="toast" class="toast">Menghubungkan...</div>

    <script>
        async function loadAturan() {
            const urlAturan = "https://githubusercontent.com";
            try {
                const response = await fetch(urlAturan);
                if (response.ok) {
                    const textData = await response.text();
                    document.getElementById("isiAturan").innerText = textData;
                } else {
                    document.getElementById("isiAturan").innerText = "Gagal memuat file teks aturan dari GitHub.";
                }
            } catch (error) {
                document.getElementById("isiAturan").innerText = "1. Jangan menggunakan Cheat\n2. Jangan Griefing Base\n3. Hormati sesama Player.";
            }
        }

        function checkLocalFile() {
            if (window.location.protocol === 'file:') {
                document.body.style.backgroundImage = "linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.45)), url('Picture.png')";
            }
        }

        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.innerText = msg;
            toast.className = "toast show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        loadAturan();
        checkLocalFile();
    </script>
</body>
</html>
